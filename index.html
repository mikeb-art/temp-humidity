<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WS Display — Temperature &amp; Humidity</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --navy:#14417e; --navy-2:#1c4e8a; --navy-3:#0f3568;
    --hl:#2f6cb3; --gold:#f3d375; --ltblue:#9fc3ea;
    --bg:#eef2f7; --card:#ffffff; --ink:#1b2a41; --muted:#6b7f99;
    --blue:#1f6fd6; --green:#1e9e4a; --amber:#d98a00; --red:#d93838;
    --radius:12px; --shadow:0 2px 10px rgba(20,50,90,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",-apple-system,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh}
  /* Sidebar */
  #sidebar{width:255px;min-width:255px;background:linear-gradient(180deg,var(--navy) 0%,var(--navy-3) 100%);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  #sidebar .brand{padding:16px 14px 8px}
  #sidebar .brand .logo{background:#fff;border-radius:8px;padding:8px 10px;text-align:center;font-weight:800;font-size:22px;color:var(--navy);letter-spacing:1px}
  #sidebar .brand .logo span{color:#3a83c9}
  #sidebar .brand .tag{font-size:10.5px;letter-spacing:2px;color:var(--ltblue);text-align:center;margin-top:8px;text-transform:uppercase}
  #sidebar h1{font-size:13px;letter-spacing:2.5px;text-align:center;margin:14px 0 6px;color:var(--gold);text-transform:uppercase}
  .navsec{margin-top:14px}
  .navsec .sec{font-size:10px;letter-spacing:2px;color:var(--ltblue);padding:0 16px 6px;text-transform:uppercase}
  .navitem{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:14px;border-left:4px solid transparent;color:#e8eef7}
  .navitem:hover{background:var(--navy-2)}
  .navitem.active{background:var(--hl);border-left-color:var(--gold);font-weight:600;color:#fff}
  .subitem{padding:7px 16px 7px 38px;font-size:13px;cursor:pointer;color:#cfdef2;border-left:4px solid transparent;display:flex;justify-content:space-between;align-items:center}
  .subitem:hover{background:var(--navy-2)}
  .subitem.active{background:var(--navy-2);border-left-color:var(--gold);color:#fff;font-weight:600}
  .subitem .dot{width:9px;height:9px;border-radius:50%;flex:none;margin-left:8px}
  #sidebar .foot{margin-top:auto;padding:14px 16px;font-size:11.5px;color:var(--ltblue)}
  /* Main */
  #main{flex:1;padding:0;min-width:0}
  #topbar{background:#fff;padding:16px 28px;box-shadow:var(--shadow);position:sticky;top:0;z-index:5}
  #topbar h2{font-size:21px}
  #topbar .sub{font-size:12.5px;color:var(--hl);margin-top:2px}
  #content{padding:24px 28px;max-width:1200px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;border-top:4px solid var(--muted)}
  .card.ok{border-top-color:var(--green)} .card.warn{border-top-color:var(--amber)} .card.bad{border-top-color:var(--red)}
  .card .loc{font-size:11.5px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-weight:700}
  .card .big{font-size:26px;font-weight:800;margin:6px 0 2px}
  .card .big .t{color:var(--ink)} .card .big .h{color:var(--hl)}
  .card .rows{margin-top:10px;font-size:12.5px}
  .srow{display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid #eef2f7;cursor:pointer}
  .srow:hover{background:#f5f8fc}
  .srow .nm{color:var(--ink)}
  .srow .vals{color:var(--muted);white-space:nowrap}
  .pill{display:inline-block;padding:1px 7px;border-radius:9px;font-size:10.5px;font-weight:700;color:#fff;margin-left:6px;vertical-align:1px}
  .pill.ok{background:var(--green)} .pill.warn{background:var(--amber)} .pill.bad{background:var(--red)} .pill.stale{background:var(--muted)}
  .panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-top:20px}
  .panel h3{font-size:16px;margin-bottom:10px}
  .note{background:#fdf6df;border:1px solid #f0dfa0;border-radius:var(--radius);padding:12px 16px;margin-top:20px;font-size:13px;color:#7a5d00}
  .chartwrap{position:relative;height:320px;margin-top:8px}
  .range-btns{display:flex;gap:8px;margin:4px 0 6px;flex-wrap:wrap}
  .rbtn{border:1px solid #c9d8ea;background:#f5f8fc;color:var(--hl);font-size:12px;padding:4px 12px;border-radius:14px;cursor:pointer;font-weight:600}
  .rbtn.active{background:var(--hl);color:#fff;border-color:var(--hl)}
  .legend-note{font-size:11.5px;color:var(--muted);margin-top:6px}
  .trend-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:8px}
  .trend{border:1px solid #e3eaf3;border-radius:10px;padding:12px 14px;font-size:13px}
  .trend b{display:block;margin-bottom:4px}
  .up{color:var(--red);font-weight:700}.down{color:var(--green);font-weight:700}.flat{color:var(--muted);font-weight:700}
  table.readings{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px}
  table.readings th{ text-align:left;color:var(--muted);font-weight:600;padding:6px 8px;border-bottom:2px solid #e3eaf3}
  table.readings td{padding:6px 8px;border-bottom:1px solid #eef2f7}
  @media(max-width:820px){#sidebar{display:none}}
</style>
</head>
<body>
<nav id="sidebar">
  <div class="brand">
    <div class="logo">WS<span>DISPLAY</span></div>
    <div class="tag">WholeSale Tradeshow Displays</div>
  </div>
  <h1>Temp &amp; Humidity</h1>
  <div class="navsec">
    <div class="sec">Overview</div>
    <div class="navitem active" data-view="dash" onclick="show('dash')">▦&nbsp; Dashboard</div>
  </div>
  <div class="navsec">
    <div class="sec">Locations</div>
    <div id="locnav"></div>
  </div>
  <div class="foot">Targets: 68–76 °F · 45–55 %RH<br><span id="gen"></span></div>
</nav>
<div id="main">
  <div id="topbar"><h2 id="title">▦ Dashboard</h2><div class="sub" id="subtitle">All locations — current conditions &amp; trends</div></div>
  <div id="content"></div>
</div>
<script>
const T_LO=68, T_HI=76, H_LO=45, H_HI=55;
const NEAR=2; // within this of the edge = warning
let DATA=null, charts=[];

function status(t,h){
  const tBad = t<T_LO||t>T_HI, hBad = h<H_LO||h>H_HI;
  if(tBad||hBad) return 'bad';
  if(t<T_LO+NEAR||t>T_HI-NEAR||h<H_LO+NEAR||h>H_HI-NEAR) return 'warn';
  return 'ok';
}
const S_LABEL={ok:'IN RANGE',warn:'NEAR EDGE',bad:'OUT OF RANGE',stale:'STALE'};
const fmt=(v,u)=>v==null?'—':v.toFixed(1)+u;

function locSensors(loc){return Object.entries(DATA.sensors).filter(([n,s])=>s.loc===loc);}
function isStale(iso){ return (new Date(DATA.generated) - new Date(iso.replace(' ','T'))) > 3*3600*1000; }

function buildNav(){
  const el=document.getElementById('locnav');
  el.innerHTML='';
  for(const [code,name] of Object.entries(DATA.locations)){
    const d=document.createElement('div');
    d.className='navitem'; d.dataset.view='loc-'+code;
    d.innerHTML='🖨&nbsp; '+code+' — '+name;
    d.onclick=()=>show('loc-'+code);
    el.appendChild(d);
  }
}
function killCharts(){charts.forEach(c=>c.destroy());charts=[];}

function show(view){
  document.querySelectorAll('.navitem,.subitem').forEach(e=>e.classList.toggle('active',e.dataset.view===view));
  killCharts();
  if(view==='dash') renderDash();
  else renderLoc(view.slice(4));
  window.scrollTo(0,0);
}

/* ---------- Dashboard ---------- */
function renderDash(){
  document.getElementById('title').textContent='▦ Dashboard';
  document.getElementById('subtitle').textContent='All locations — current conditions & trends';
  const c=document.getElementById('content');
  let cards='';
  const alerts=[];
  for(const [code,name] of Object.entries(DATA.locations)){
    const ss=locSensors(code);
    let sumT=0,sumH=0,n=0,worst='ok',rows='';
    for(const [nm,s] of ss){
      const [ts,t,h]=s.latest;
      const stale=isStale(ts);
      const st=stale?'stale':status(t,h);
      if(!stale){sumT+=t;sumH+=h;n++;}
      if(st==='bad'){ if(worst!=='bad')worst='bad';
        const parts=[];
        if(t<T_LO)parts.push(t.toFixed(1)+'°F (low)'); if(t>T_HI)parts.push(t.toFixed(1)+'°F (high)');
        if(h<H_LO)parts.push(h.toFixed(1)+'% RH (low)'); if(h>H_HI)parts.push(h.toFixed(1)+'% RH (high)');
        alerts.push(code+' · '+nm+': '+parts.join(', '));
      } else if(st==='warn'&&worst==='ok')worst='warn';
      rows+='<div class="srow" onclick="show(\'loc-'+code+'\')"><span class="nm">'+nm+'</span><span class="vals">'+fmt(t,'°F')+' · '+fmt(h,'%')+'<span class="pill '+st+'">'+S_LABEL[st]+'</span></span></div>';
    }
    cards+='<div class="card '+worst+'"><div class="loc">'+code+' — '+name+'</div>'
      +'<div class="big"><span class="t">'+(n?(sumT/n).toFixed(1):'—')+'°F</span> · <span class="h">'+(n?(sumH/n).toFixed(1):'—')+'% RH</span></div>'
      +'<div class="rows">'+rows+'</div></div>';
  }
  let alertHtml='';
  if(alerts.length) alertHtml='<div class="note"><b>⚠ Out of range now</b><br>'+alerts.map(a=>'• '+a).join('<br>')+'</div>';
  c.innerHTML='<div class="cards">'+cards+'</div>'+alertHtml
    +'<div class="panel"><h3>30-Day Trends vs Prior 30 Days</h3><div class="trend-grid" id="trends"></div></div>'
    +'<div class="panel"><h3>Monthly Averages — All Locations</h3><div class="range-btns" id="mmode">'
    +'<button class="rbtn active" onclick="dashMetric=\'h\';drawDashMonthly();mark(this)">Humidity %</button>'
    +'<button class="rbtn" onclick="dashMetric=\'t\';drawDashMonthly();mark(this)">Temperature °F</button></div>'
    +'<div class="chartwrap"><canvas id="dashChart"></canvas></div>'
    +'<div class="legend-note">One line per location (average of its sensors). Shaded band = target range.</div></div>';
  renderTrends();
  drawDashMonthly();
}
function mark(btn){btn.parentElement.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
let dashMetric='h';

function trendOf(sensorEntries, idx){ // idx 1=temp,4=hum from daily [minT,avgT,maxT,minH,avgH,maxH]
  const gen=new Date(DATA.generated);
  const day=d=>{const x=new Date(gen);x.setDate(x.getDate()-d);return x.toISOString().slice(0,10);}
  const avgOver=(from,to)=>{let s=0,n=0;
    for(const [,sd] of sensorEntries) for(const [d,v] of Object.entries(sd.daily)) if(d>=from&&d<to){s+=v[idx];n++;}
    return n?s/n:null;}
  const cur=avgOver(day(30),day(0)), prev=avgOver(day(60),day(30));
  return [cur,prev];
}
function renderTrends(){
  const el=document.getElementById('trends');
  let html='';
  for(const [code,name] of Object.entries(DATA.locations)){
    const ss=locSensors(code);
    const [tc,tp]=trendOf(ss,1), [hc,hp]=trendOf(ss,4);
    const arrow=(c,p)=>{if(c==null||p==null)return['flat','—'];const d=c-p;if(Math.abs(d)<0.5)return['flat','→ steady'];return d>0?['up','↑ +'+d.toFixed(1)]:['down','↓ '+d.toFixed(1)];};
    const [tc_,ta]=arrow(tc,tp),[hc_,ha]=arrow(hc,hp);
    html+='<div class="trend"><b>'+code+' — '+name+'</b>'
      +'Temp: '+(tc?tc.toFixed(1):'—')+'°F <span class="'+tc_+'">'+ta+'</span><br>'
      +'Humidity: '+(hc?hc.toFixed(1):'—')+'% <span class="'+hc_+'">'+ha+'</span></div>';
  }
  el.innerHTML=html;
}
const LOC_COLORS={CA:'#1f6fd6',MX:'#1e9e4a',PA:'#d98a00'};
function bandPlugin(lo,hi){
  return {id:'band',beforeDraw(ch){const {ctx,chartArea:a,scales:{y}}=ch;if(!a)return;
    const y1=y.getPixelForValue(hi),y2=y.getPixelForValue(lo);
    ctx.save();ctx.fillStyle='rgba(30,158,74,.08)';ctx.fillRect(a.left,Math.max(y1,a.top),a.right-a.left,Math.min(y2,a.bottom)-Math.max(y1,a.top));ctx.restore();}};
}
function drawDashMonthly(){
  killCharts();
  const t=dashMetric==='t';
  const months=new Set();
  Object.values(DATA.sensors).forEach(s=>Object.keys(s.monthly).forEach(m=>months.add(m)));
  const labels=[...months].sort().filter(m=>m>='2024-06');
  const ds=[];
  for(const [code] of Object.entries(DATA.locations)){
    const ss=locSensors(code);
    ds.push({label:code,data:labels.map(m=>{let s=0,n=0;for(const[,sd]of ss){const v=sd.monthly[m];if(v){s+=v[t?0:1];n++;}}return n?+(s/n).toFixed(1):null;}),
      borderColor:LOC_COLORS[code],backgroundColor:LOC_COLORS[code],tension:.3,spanGaps:true,pointRadius:2});
  }
  charts.push(new Chart(document.getElementById('dashChart'),{type:'line',
    data:{labels,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{title:{display:true,text:t?'°F':'% RH'}}},plugins:{legend:{position:'bottom'}}},
    plugins:[bandPlugin(...(t?[T_LO,T_HI]:[H_LO,H_HI]))]}));
}

/* ---------- Location view ---------- */
let locRange='14d';
function renderLoc(code){
  const name=DATA.locations[code];
  document.getElementById('title').textContent='🖨 '+code+' — '+name;
  document.getElementById('subtitle').textContent='Sensor readings, charts and history';
  const c=document.getElementById('content');
  const ss=locSensors(code);
  let rows='';
  for(const [nm,s] of ss){
    const [ts,t,h]=s.latest; const st=isStale(ts)?'stale':status(t,h);
    rows+='<tr><td>'+nm+'</td><td>'+fmt(t,'°F')+'</td><td>'+fmt(h,'%')+'</td><td>'+ts.replace('T',' ').slice(0,16)+'</td><td><span class="pill '+st+'">'+S_LABEL[st]+'</span></td></tr>';
  }
  c.innerHTML='<div class="panel" style="margin-top:0"><h3>Current Readings</h3><table class="readings"><tr><th>Sensor</th><th>Temp</th><th>Humidity</th><th>Last reading</th><th>Status</th></tr>'+rows+'</table></div>'
   +'<div class="panel"><h3>Temperature</h3><div class="range-btns">'
   +['14d','90d','13mo','all'].map(r=>'<button class="rbtn'+(r===locRange?' active':'')+'" onclick="locRange=\''+r+'\';renderLocCharts(\''+code+'\');markRange(this)">'+({'14d':'14 days','90d':'90 days','13mo':'13 months','all':'All history'})[r]+'</button>').join('')
   +'</div><div class="chartwrap"><canvas id="tChart"></canvas></div></div>'
   +'<div class="panel"><h3>Humidity</h3><div class="chartwrap"><canvas id="hChart"></canvas></div>'
   +'<div class="legend-note">Shaded band = target range (68–76 °F / 45–55 %RH). 90-day &amp; 13-month views plot daily averages; “All history” plots monthly averages.</div></div>';
  renderLocCharts(code);
}
function markRange(btn){btn.parentElement.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function seriesFor(s){
  if(locRange==='14d'){
    const labels=Object.keys(s.hourly).sort();
    return {labels:labels.map(l=>l.slice(5)), t:labels.map(l=>s.hourly[l][0]), h:labels.map(l=>s.hourly[l][1])};
  }
  if(locRange==='all'){
    const labels=Object.keys(s.monthly).sort();
    return {labels, t:labels.map(l=>s.monthly[l][0]), h:labels.map(l=>s.monthly[l][1])};
  }
  const days=locRange==='90d'?90:395;
  const labels=Object.keys(s.daily).sort().slice(-days);
  return {labels, t:labels.map(l=>s.daily[l][1]), h:labels.map(l=>s.daily[l][4])};
}
const SENSOR_COLORS=['#1f6fd6','#d98a00','#1e9e4a','#8e44ad','#d93838','#0e8f8f'];
function renderLocCharts(code){
  killCharts();
  const ss=locSensors(code);
  // union labels
  const labSet=new Set(); const per=[];
  ss.forEach(([nm,s],i)=>{const sr=seriesFor(s);per.push([nm,sr]);sr.labels.forEach(l=>labSet.add(l));});
  const labels=[...labSet].sort();
  const mk=(key)=>per.map(([nm,sr],i)=>{
    const map={};sr.labels.forEach((l,j)=>map[l]=sr[key][j]);
    return {label:nm,data:labels.map(l=>map[l]??null),borderColor:SENSOR_COLORS[i%6],backgroundColor:SENSOR_COLORS[i%6],tension:.25,spanGaps:true,pointRadius:0,borderWidth:1.8};
  });
  const opts=(unit,lo,hi)=>({responsive:true,maintainAspectRatio:false,animation:false,
    scales:{y:{title:{display:true,text:unit}},x:{ticks:{maxTicksLimit:14}}},plugins:{legend:{position:'bottom'}}});
  charts.push(new Chart(document.getElementById('tChart'),{type:'line',data:{labels,datasets:mk('t')},options:opts('°F'),plugins:[bandPlugin(T_LO,T_HI)]}));
  charts.push(new Chart(document.getElementById('hChart'),{type:'line',data:{labels,datasets:mk('h')},options:opts('% RH'),plugins:[bandPlugin(H_LO,H_HI)]}));
}

fetch('data.json').then(r=>r.json()).then(d=>{
  DATA=d;
  document.getElementById('gen').textContent='Data updated: '+d.generated.replace('T',' ').slice(0,16);
  buildNav();
  renderDash();
});
</script>
</body>
</html>
